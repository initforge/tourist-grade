<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Travela - Nền tảng đặt tour du lịch Việt Nam chất lượng cao" />
    <title>Travela - Khám Phá Việt Nam Đẹp Nhất</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
      /* Critical inline CSS — prevents FOUC */
      html, body { margin: 0; padding: 0; background: #FBFBFB; }
      #app-loader {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #FBFBFB;
        font-family: "Inter", system-ui, sans-serif;
        transition: opacity .3s;
      }
      #app-loader .logo-mark {
        width: 56px; height: 56px;
        border-radius: 14px;
        background: linear-gradient(135deg, #2C5545, #1a3d30);
        display: flex; align-items: center; justify-content: center;
        margin-bottom: 20px;
        animation: pulse-logo 1.8s ease-in-out infinite;
      }
      #app-loader .logo-mark svg { width: 32px; height: 32px; }
      #app-loader .brand { font-size: 18px; font-weight: 600; color: #2A2421; letter-spacing: -0.02em; }
      #app-loader .dots { display: flex; gap: 6px; margin-top: 16px; }
      #app-loader .dots span {
        width: 6px; height: 6px; border-radius: 50%;
        background: #D4AF37; opacity: .3;
        animation: dot-bounce .8s ease-in-out infinite;
      }
      #app-loader .dots span:nth-child(2) { animation-delay: .15s; }
      #app-loader .dots span:nth-child(3) { animation-delay: .3s; }
      @keyframes dot-bounce {
        0%, 100% { opacity: .3; transform: translateY(0); }
        50% { opacity: 1; transform: translateY(-4px); }
      }
      @keyframes pulse-logo {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.04); }
      }
    </style>
  </head>
  <body>
    <div id="app-loader">
      <div class="logo-mark">
        <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M16 4L19 12H26L20.5 17L22.5 25L16 20.5L9.5 25L11.5 17L6 12H13L16 4Z" fill="#D4AF37"/>
        </svg>
      </div>
      <div class="brand">Travela</div>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Remove loader after React mounts
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root && root.children.length > 0) {
          const loader = document.getElementById('app-loader');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
  </body>
</html>
