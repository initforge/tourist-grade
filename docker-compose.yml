services:
  db:
    image: postgres:16-alpine
    container_name: travela-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: travela
      POSTGRES_USER: travela
      POSTGRES_PASSWORD: travela
    ports:
      - '5432:5432'
    volumes:
      - travela-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travela -d travela']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travela-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://travela:travela@db:5432/travela?schema=public
      CORS_ORIGIN: http://localhost:8080,http://127.0.0.1:8080
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-travela-local-access-secret-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-travela-local-refresh-secret-change-in-production}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      PAYOS_CLIENT_ID: ${PAYOS_CLIENT_ID:-}
      PAYOS_API_KEY: ${PAYOS_API_KEY:-}
      PAYOS_CHECKSUM_KEY: ${PAYOS_CHECKSUM_KEY:-}
      PAYOS_RETURN_URL: ${PAYOS_RETURN_URL:-http://localhost:8080/booking/success}
      PAYOS_CANCEL_URL: ${PAYOS_CANCEL_URL:-http://localhost:8080/booking/lookup}
      PAYOS_WEBHOOK_URL: ${PAYOS_WEBHOOK_URL:-}
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api/v1
    container_name: travela-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  travela-postgres:
