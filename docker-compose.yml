services:
  db:
    image: postgres:16-alpine
    container_name: travela-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: travela
      POSTGRES_USER: travela
      POSTGRES_PASSWORD: travela
    ports:
      - '5432:5432'
    volumes:
      - travela-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U travela -d travela']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: travela-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ./backend/.env
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://travela:travela@db:5432/travela?schema=public
      CORS_ORIGIN: http://localhost:8080,http://127.0.0.1:8080
    ports:
      - '4000:4000'

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:4000/api/v1
    container_name: travela-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - '8080:80'

volumes:
  travela-postgres:
